{% extends "base.html" %}

{% block title %}QR Code | ABM{% endblock %}

{% block content %}
<div class="row justify-content-center py-4 py-lg-5">
    <div class="col-lg-8">
        <div class="card border-0 surface-card">
            <div class="card-body p-4 p-lg-5 text-center">
                <p class="section-label mb-3">QR Code</p>
                <h1 class="h2 fw-bold mb-3">Compartilhe o formulário com os participantes</h1>
                <p class="text-secondary mb-4">
                    Escaneie o QR Code abaixo para abrir diretamente a página de cadastro.
                </p>

                <div class="qr-frame mx-auto mb-4">
                    <img src="{{ qr_image_url }}" alt="QR Code do formulário" class="img-fluid">
                </div>

                <div class="d-flex flex-wrap justify-content-center gap-2">
                    <a class="btn btn-primary" href="{{ qr_image_url }}" download="qrcode-sorteio-medico.png">Baixar imagem</a>
                    <a class="btn btn-shell" href="{{ url_for('main.register') }}">Voltar ao cadastro</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
